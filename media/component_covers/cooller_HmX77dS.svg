<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- Основной корпус радиатора -->
    <rect x="25" y="20" width="55" height="55" rx="5" fill="#ffffff" />
    
    <!-- Вентилятор (черный круг внутри белого корпуса) -->
    <circle cx="52.5" cy="47.5" r="22" fill="#000000" />
    
    <!-- Лопасти (белые) -->
    <g fill="#ffffff">
        <path d="M52.5 30c2 0 4 8 4 8s-8 3-10 3 6-11 6-11z" />
        <path d="M70 47.5c0 2-8 4-8 4s-3-8-3-10 11 6 11 6z" />
        <path d="M52.5 65c-2 0-4-8-4-8s8-3 10-3-6 11-6 11z" />
        <path d="M35 47.5c0-2 8-4 8-4s3 8 3 10-11-6-11-6z" />
    </g>
    
    <!-- Центральная точка -->
    <circle cx="52.5" cy="47.5" r="4" fill="#ffffff" />
    
    <!-- Ребра радиатора слева (белые линии) -->
    <g stroke="#ffffff" stroke-width="3" stroke-linecap="round">
        <line x1="15" y1="25" x2="22" y2="25" />
        <line x1="15" y1="33" x2="22" y2="33" />
        <line x1="15" y1="41" x2="22" y2="41" />
        <line x1="15" y1="49" x2="22" y2="49" />
        <line x1="15" y1="57" x2="22" y2="57" />
        <line x1="15" y1="65" x2="22" y2="65" />
    </g>
    
    <!-- Тепловые трубки снизу (белые линии) -->
    <path d="M35 75v6c0 3 2 5 5 5h25c3 0 5-2 5-5v-6" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
</svg>