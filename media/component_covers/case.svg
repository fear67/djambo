<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
  <!-- Общий контур системного блока -->
  <rect x="25" y="20" width="50" height="60" rx="3" />
  
  <!-- Вертикальная линия передней панели (слева) -->
  <line x1="38" y1="20" x2="38" y2="80" />
  
  <!-- Верхний отсек (например, дисковод) -->
  <rect x="45" y="30" width="22" height="10" rx="1" />
  
  <!-- Средний отсек -->
  <rect x="45" y="45" width="22" height="10" rx="1" />
  
  <!-- Кнопка включения (круглая) -->
  <circle cx="56" cy="62" r="3" />
  
  <!-- Индикатор или маленькая кнопка снизу -->
  <circle cx="56" cy="72" r="1.5" fill="white" stroke="none" />
</svg>