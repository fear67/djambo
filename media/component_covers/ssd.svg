<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- Корпус платы M.2 (белый контур) -->
    <rect x="35" y="10" width="30" height="80" rx="3" fill="none" stroke="#ffffff" stroke-width="3" />
    
    <!-- Контактная группа сверху (белая заливка) -->
    <rect x="38" y="5" width="4" height="8" rx="1" fill="#ffffff" />
    <rect x="44" y="5" width="4" height="8" rx="1" fill="#ffffff" />
    <rect x="52" y="5" width="4" height="8" rx="1" fill="#ffffff" />
    <rect x="58" y="5" width="4" height="8" rx="1" fill="#ffffff" />

    <!-- Чипы памяти (белые прямоугольники) -->
    <rect x="40" y="22" width="20" height="22" rx="2" fill="#ffffff" />
    <rect x="40" y="48" width="20" height="12" rx="1" fill="#ffffff" />
    <rect x="40" y="63" width="20" height="12" rx="1" fill="#ffffff" />

    <!-- Элементы внизу (белые точки) -->
    <circle cx="42" cy="80" r="2" fill="#ffffff" />
    <circle cx="50" cy="80" r="2" fill="#ffffff" />
    <circle cx="58" cy="80" r="2" fill="#ffffff" />

    <!-- Вырез под крепление снизу -->
    <circle cx="50" cy="88" r="4" fill="#000000" />
</svg>