<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Внешняя рамка платы -->
  <rect x="15" y="15" width="70" height="70" rx="2" />
  
  <!-- Сокет процессора (слева сверху) -->
  <rect x="25" y="25" width="22" height="22" rx="1" />
  <!-- "Лучи" или контакты вокруг сокета -->
  <path d="M36 20v5M36 47v5M20 36h5M47 36h5" stroke-width="1.5" />
  
  <!-- Слоты оперативной памяти (справа от сокета) -->
  <line x1="60" y1="25" x2="60" y2="47" />
  <line x1="68" y1="25" x2="68" y2="47" />
  <line x1="75" y1="25" x2="75" y2="47" />

  <!-- Слоты PCI / Нижние элементы -->
  <rect x="55" y="58" width="20" height="15" rx="1" /> <!-- Чипсет -->
  <line x1="25" y1="62" x2="45" y2="62" /> <!-- Слот 1 -->
  <line x1="25" y1="70" x2="45" y2="70" /> <!-- Слот 2 -->
</svg>