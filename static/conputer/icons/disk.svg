<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
  <!-- Основной корпус диска -->
  <rect x="25" y="20" width="50" height="60" rx="3" />
  
  <!-- Четыре винтика по углам корпуса -->
  <circle cx="30" cy="25" r="1" fill="white" stroke="none" />
  <circle cx="70" cy="25" r="1" fill="white" stroke="none" />
  <circle cx="30" cy="75" r="1" fill="white" stroke="none" />
  <circle cx="70" cy="75" r="1" fill="white" stroke="none" />

  <!-- Магнитная пластина (круг в центре) -->
  <circle cx="50" cy="42" r="18" />
  <circle cx="50" cy="42" r="4" /> <!-- Шпиндель -->
  
  <!-- Считывающая головка (кронштейн слева) -->
  <path d="M35 65l10-15" />
  <circle cx="35" cy="65" r="2.5" />
  
  <!-- Три разъема/индикатора внизу справа -->
  <line x1="55" y1="70" x2="57" y2="70" stroke-width="2" />
  <line x1="61" y1="70" x2="63" y2="70" stroke-width="2" />
  <line x1="67" y1="70" x2="69" y2="70" stroke-width="2" />
</svg>